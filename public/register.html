<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <title>Registrarse - Ahorcado</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="ambient ambient-one" aria-hidden="true"></div>
  <div class="ambient ambient-two" aria-hidden="true"></div>
  <header class="topbar glass">
    <a class="brand" href="/" aria-label="Ahorcado UTVAM, inicio"><span class="brand-mark" aria-hidden="true">A</span><span>Ahorcado <strong>UTVAM</strong></span></a>
    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Cambiar tema" aria-pressed="false"><span class="theme-icon">вҳҖпёҺ</span><span class="theme-icon">вҳҫ</span><span class="theme-thumb" aria-hidden="true"></span></button>
  </header>
  <main class="app">
    <section class="panel" id="register-panel">
      <h1>Crear cuenta</h1>
      <p>Completa el formulario para registrarte como alumno o profesor.</p>
      
      <form id="register-form" class="auth-form" novalidate>
        
        <label for="register-username">Nombre de usuario:</label>
        <input 
          type="text" 
          id="register-username" 
          name="username"
          maxlength="30" 
          pattern="^[a-zA-Z0-9_]{3,30}$"
          title="El nombre de usuario debe tener entre 3 y 30 caracteres y solo contener letras, nГәmeros o guiones bajos."
          autocomplete="username"
          required 
        />

        <label for="register-first-name">Nombres:</label>
        <input 
          type="text" 
          id="register-first-name" 
          name="firstName"
          maxlength="50" 
          pattern="^[a-zA-ZГұГ‘ГЎГ©ГӯГіГәГҒГүГҚГ“ГҡГјГң\s]+$"
          title="El nombre solo debe contener letras."
          required 
        />

        <label for="register-last-name">Apellidos:</label>
        <input 
          type="text" 
          id="register-last-name" 
          name="lastName"
          maxlength="50" 
          pattern="^[a-zA-ZГұГ‘ГЎГ©ГӯГіГәГҒГүГҚГ“ГҡГјГң\s]+$"
          title="Los apellidos solo deben contener letras."
          required 
        />

        <label for="register-email">Correo electrГіnico:</label>
        <input 
          type="email" 
          id="register-email" 
          name="email"
          autocomplete="email"
          required 
        />

        <label for="register-role">Rol:</label>
        <select id="register-role" name="role" required>
          <option value="" disabled selected>Selecciona tu rol</option>
          <option value="student">Alumno</option>
          <option value="teacher">Profesor</option>
        </select>

        <label for="register-password">ContraseГұa:</label>
        <input 
          type="password" 
          id="register-password" 
          name="password"
          minlength="6"
          title="La contraseГұa debe tener al menos 6 caracteres."
          autocomplete="new-password"
          required 
        />

        <div class="auth-actions">
          <button type="submit" id="register-form-btn">Crear cuenta</button>
          <a href="/" class="secondary-button" id="back-to-login">Volver al login</a>
        </div>
      </form>
      
      <div class="message" id="register-message" aria-live="polite"></div>
    </section>
  </main>

  <script src="components/theme.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
